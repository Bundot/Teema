<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Teema — Admin Login</title>
  <link rel="stylesheet" href="login.css">
  <!-- Security scripts -->
  <script src="config-loader.js"></script>
  <script src="secure-storage.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">T</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access the admin dashboard</p>
      </div>
      
      <form id="login-form" class="login-form" onsubmit="return false;">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input id="email" type="email" class="form-input form-input-icon" placeholder="admin@example.com" required autocomplete="email" />
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-input form-input-icon" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        
        <button id="signin" type="submit" class="login-button">
          <span class="button-text">Sign In</span>
        </button>
      </form>
      
      <div id="msg" class="login-error"></div>
      
      <div class="login-footer">
        <a href="/index.html">← Back to Store</a>
      </div>
    </div>
  </div>
  
  <!-- Security scripts -->
  <script src="config-loader.js"></script>
  <script src="secure-storage.js"></script>
  <script src="dev-env.js"></script>
  <script>
    // Production-ready: No hardcoded credentials
    // Configuration will be loaded from environment variables in production
    // For local development, dev-env.js sets up environment variables
    
    // Wait for configuration to load, then check if reinit is needed
    setTimeout(() => {
      if (window.TEEMA_CONFIG && !window.TEEMA_CONFIG.isValid && typeof window.TEEMA_CONFIG.reinit === 'function') {
        console.warn('⚠️ Configuration invalid - check your .env file');
        window.TEEMA_CONFIG.reinit();
      }
    }, 200);
  </script>
  <script>
    console.log('✅ Supabase config loaded directly in login page');
    console.log('SUPABASE_URL:', window.SUPABASE_URL ? '✅' : '❌');
    console.log('SUPABASE_ANON:', window.SUPABASE_ANON ? '✅' : '❌');
  </script>
  
  <script type="module">
    // Enhanced login script with better error handling
    console.log('🔐 Login script starting...');
    
    // Wait for configuration to be loaded
    function waitForConfig() {
      return new Promise((resolve) => {
        const checkConfig = () => {
          const SUPABASE_URL = window.SUPABASE_URL || (window.TEEMA_CONFIG && window.TEEMA_CONFIG.SUPABASE_URL);
          const SUPABASE_ANON = window.SUPABASE_ANON || (window.TEEMA_CONFIG && window.TEEMA_CONFIG.SUPABASE_ANON);
          
          if (SUPABASE_URL && SUPABASE_ANON) {
            resolve({ SUPABASE_URL, SUPABASE_ANON });
          } else if (window.TEEMA_CONFIG && window.TEEMA_CONFIG.isValid) {
            resolve({ 
              SUPABASE_URL: window.TEEMA_CONFIG.SUPABASE_URL, 
              SUPABASE_ANON: window.TEEMA_CONFIG.SUPABASE_ANON 
            });
          } else {
            setTimeout(checkConfig, 100);
          }
        };
        checkConfig();
      });
    }
    
    waitForConfig().then(({ SUPABASE_URL, SUPABASE_ANON }) => {
      console.log('📋 Configuration check:');
      console.log('SUPABASE_URL:', SUPABASE_URL ? '✅' : '❌');
      console.log('SUPABASE_ANON:', SUPABASE_ANON ? '✅' : '❌');
      
      if(!SUPABASE_URL || !SUPABASE_ANON) {
        console.error('❌ Supabase configuration missing');
        document.getElementById('msg').textContent = 'Supabase not configured - check console';
        return;
      }
      
      console.log('📦 Importing Supabase client...');
      import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm').then(mod=>{
        console.log('✅ Supabase client imported');
        
        const { createClient } = mod;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
        console.log('🔧 Supabase client created');
        
        const signinBtn = document.getElementById('signin');
        const msgDiv = document.getElementById('msg');
        
        if (!signinBtn) {
          console.error('❌ Sign in button not found');
          return;
        }
        
        console.log('🖱️ Setting up click handler...');
        
        signinBtn.addEventListener('click', async ()=>{
          console.log('🖱️ Sign in button clicked');
          
          const email = document.getElementById('email')?.value?.trim();
          const password = document.getElementById('password')?.value;
          const signinBtn = document.getElementById('signin');
          const msgDiv = document.getElementById('msg');
          
          console.log('📝 Form data:', { email, password: password ? '***' : 'empty' });
          
          if (!email || !password) {
            console.warn('⚠️ Missing email or password');
            showError('Please enter email and password');
            return;
          }
          
          // Show loading state
          signinBtn.classList.add('loading');
          signinBtn.disabled = true;
          hideError();
          showError('Signing in...');
          
          console.log('🔐 Attempting sign in...');
          
          try{
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
              console.error('❌ Sign in error:', error);
              showError('Sign-in error: ' + error.message);
              return;
            }
            
            console.log('✅ Sign in successful!');
            console.log('👤 User:', data.user?.email);
            console.log('🆔 User ID:', data.user?.id);
            
            showSuccess('Signed in successfully! Redirecting...');
            
            // 🔄 REDIRECT: Go to admin dashboard (Supabase handles session automatically)
            setTimeout(()=> window.location.href = '/admin.html', 1500);
            
          }catch(e){
            console.error('❌ Unexpected error:', e);
            showError('Error: ' + (e.message || e));
          } finally {
            // Reset loading state
            signinBtn.classList.remove('loading');
            signinBtn.disabled = false;
          }
        });
        
        // Helper functions for better UX
        function showError(message) {
          const msgDiv = document.getElementById('msg');
          if (msgDiv) {
            msgDiv.textContent = message;
            msgDiv.className = 'login-error show';
          }
        }
        
        function showSuccess(message) {
          const msgDiv = document.getElementById('msg');
          if (msgDiv) {
            msgDiv.textContent = message;
            msgDiv.className = 'login-success show';
          }
        }
        
        function hideError() {
          const msgDiv = document.getElementById('msg');
          if (msgDiv) {
            msgDiv.className = 'login-error';
          }
        }
        
        // Form submission handler
        document.getElementById('login-form').addEventListener('submit', (e) => {
          e.preventDefault();
          document.getElementById('signin').click();
        });
        
        console.log('✅ Login setup complete');
        
      }).catch(e=>{
        console.error('❌ Failed to import Supabase:', e);
        if (document.getElementById('msg')) {
          showError('Could not load authentication service: ' + e.message);
        }
      });
    }).catch(err => {
      console.error('❌ Configuration loading failed:', err);
      if (document.getElementById('msg')) {
        document.getElementById('msg').textContent = 'Failed to load configuration';
      }
    });
    
    // Also handle case where config never loads
    setTimeout(() => {
      if (!window.SUPABASE_URL && !window.SUPABASE_ANON && (!window.TEEMA_CONFIG || !window.TEEMA_CONFIG.isValid)) {
        console.error('❌ Configuration failed to load after timeout');
        if (document.getElementById('msg')) {
          document.getElementById('msg').textContent = 'Configuration failed to load - refresh page';
        }
      }
    }, 5000);
  </script>
</body>
</html>

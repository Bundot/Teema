<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teema — Admin Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="container" style="max-width:640px;margin:40px auto;">
    <h1>Admin sign in</h1>
    <form id="login-form" onsubmit="return false;">
      <label>Email <input id="email" type="email" required /></label>
      <label>Password <input id="password" type="password" required /></label>
      <div style="margin-top:12px;"><button id="signin" class="btn btn-primary">Sign in</button></div>
      <div id="msg" style="margin-top:10px;color:#c00"></div>
    </form>
  </main>
  <script type="module">
    // This login page expects `config/supabase.local.js` to set window.SUPABASE_URL and window.SUPABASE_ANON
    import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm').then(mod=>{
      const { createClient } = mod;
      const SUPABASE_URL = window.SUPABASE_URL || null;
      const SUPABASE_ANON = window.SUPABASE_ANON || null;
      if(!SUPABASE_URL || !SUPABASE_ANON) {
        document.getElementById('msg').textContent = 'Supabase not configured (missing config/supabase.local.js)';
        return;
      }
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);
      document.getElementById('signin').addEventListener('click', async ()=>{
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        document.getElementById('msg').textContent = 'Signing in...';
        try{
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if(error) { document.getElementById('msg').textContent = 'Sign-in error: '+error.message; return; }
          document.getElementById('msg').textContent = 'Signed in. Redirecting to admin...';
          // store session in localStorage for admin page to use if needed
          if(data?.session) localStorage.setItem('supabase_session', JSON.stringify(data.session));
          setTimeout(()=> window.location.href = '/admin.html', 800);
        }catch(e){ document.getElementById('msg').textContent = 'Error: '+(e.message||e); }
      });
    }).catch(e=>{ document.getElementById('msg').textContent = 'Could not load Supabase client: '+e.message; });
  </script>
</body>
</html>
